<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#10141f">
<title>譯場 InterpDesk — 會議即時翻譯</title>
<style>
  :root{
    --ink:#10141f;          /* 深墨藍底 */
    --panel:#1a2030;
    --panel2:#222a3d;
    --line:#303a52;
    --paper:#e9ecf4;        /* 主文字 */
    --dim:#8b94ab;
    --gold:#d9a441;         /* 口譯亭琥珀燈 */
    --jade:#4fc08d;         /* 錄音中 */
    --red:#e25b5b;
    --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;
    background:var(--ink);color:var(--paper);
    display:flex;flex-direction:column;overflow:hidden;
    padding-top:env(safe-area-inset-top);
  }

  /* ── 頂欄 ── */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;border-bottom:1px solid var(--line);flex-shrink:0;
  }
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand b{font-size:17px;letter-spacing:2px}
  .brand span{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:1px}
  .hbtns{display:flex;gap:8px}
  .hbtn{
    background:var(--panel);border:1px solid var(--line);color:var(--dim);
    border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;
  }
  .hbtn:active{background:var(--panel2)}

  /* ── 語言列 ── */
  .langbar{
    display:flex;align-items:center;gap:8px;padding:10px 16px;
    border-bottom:1px solid var(--line);flex-shrink:0;
  }
  select{
    flex:1;appearance:none;background:var(--panel);border:1px solid var(--line);
    color:var(--paper);border-radius:10px;padding:10px 12px;font-size:15px;
    text-align:center;font-family:inherit;
  }
  .swap{
    background:none;border:1px solid var(--line);color:var(--gold);
    border-radius:50%;width:38px;height:38px;font-size:17px;cursor:pointer;flex-shrink:0;
  }
  .swap:active{background:var(--panel2)}

  /* ── 紀錄區 ── */
  #log{
    flex:1;overflow-y:auto;padding:14px 16px 20px;
    -webkit-overflow-scrolling:touch;
  }
  .empty{
    height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;color:var(--dim);text-align:center;padding:0 30px;
  }
  .empty .lamp{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 18px var(--gold);opacity:.7}
  .empty p{font-size:14px;line-height:1.8}

  .entry{
    border-left:2px solid var(--line);padding:2px 0 2px 12px;margin-bottom:18px;
    animation:fadein .25s ease;
  }
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .entry .meta{
    font-family:var(--mono);font-size:10px;color:var(--dim);
    letter-spacing:1px;margin-bottom:4px;
  }
  .entry .src{font-size:14px;color:var(--dim);line-height:1.6;margin-bottom:6px}
  .entry .dst{font-size:17px;line-height:1.65;font-weight:500}
  .entry .dst.pending{color:var(--dim);font-style:italic}
  .entry.live{border-left-color:var(--jade)}
  .entry.live .dst{color:var(--jade)}

  /* ── 底部控制 ── */
  footer{
    flex-shrink:0;padding:12px 16px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);display:flex;align-items:center;gap:14px;
    background:var(--ink);
  }
  .status{flex:1;min-width:0}
  .status .st1{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--dim)}
  .status .st2{font-size:13px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  body.rec .status .st1{color:var(--jade)}

  #mic{
    width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;
    background:var(--gold);color:var(--ink);font-size:15px;font-weight:700;
    letter-spacing:2px;transition:background .2s;
    box-shadow:0 0 0 0 rgba(217,164,65,.5);
  }
  body.rec #mic{
    background:var(--red);color:#fff;
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(226,91,91,.45)}
    70%{box-shadow:0 0 0 18px rgba(226,91,91,0)}
    100%{box-shadow:0 0 0 0 rgba(226,91,91,0)}
  }

  /* ── 匯出面板 ── */
  #sheet{
    position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
    align-items:flex-end;z-index:50;
  }
  #sheet.open{display:flex}
  .sheetbox{
    background:var(--panel);width:100%;border-radius:18px 18px 0 0;
    padding:20px 20px calc(24px + env(safe-area-inset-bottom));
  }
  .sheetbox h3{font-size:15px;margin-bottom:14px;letter-spacing:1px}
  .sheetbtn{
    display:block;width:100%;text-align:left;background:var(--panel2);
    border:1px solid var(--line);color:var(--paper);border-radius:10px;
    padding:13px 14px;font-size:15px;margin-bottom:10px;cursor:pointer;font-family:inherit;
  }
  .sheetbtn small{display:block;color:var(--dim);font-size:12px;margin-top:2px}
  .danger{color:var(--red)}

  #toast{
    position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    background:var(--panel2);border:1px solid var(--line);color:var(--paper);
    padding:9px 18px;border-radius:20px;font-size:13px;z-index:99;display:none;
  }
</style>
</head>
<body>

<header>
  <div class="brand"><b>譯場</b><span>INTERP DESK</span></div>
  <div class="hbtns">
    <button class="hbtn" id="keyBtn" onclick="openKey()">⚙ API</button>
    <button class="hbtn" onclick="openSheet()">匯出</button>
  </div>
</header>

<div class="langbar">
  <select id="srcLang">
    <option value="en-US">英文 English</option>
    <option value="ja-JP">日文 日本語</option>
    <option value="ko-KR">韓文 한국어</option>
    <option value="de-DE">德文 Deutsch</option>
    <option value="fr-FR">法文 Français</option>
    <option value="es-ES">西班牙文 Español</option>
    <option value="th-TH">泰文 ไทย</option>
    <option value="vi-VN">越南文 Tiếng Việt</option>
    <option value="zh-TW">中文（台灣）</option>
  </select>
  <button class="swap" onclick="swapLang()" title="交換語言">⇅</button>
  <select id="dstLang">
    <option value="zh-TW">中文（台灣）</option>
    <option value="en-US">英文 English</option>
    <option value="ja-JP">日文 日本語</option>
    <option value="ko-KR">韓文 한국어</option>
    <option value="de-DE">德文 Deutsch</option>
    <option value="fr-FR">法文 Français</option>
    <option value="es-ES">西班牙文 Español</option>
    <option value="th-TH">泰文 ไทย</option>
    <option value="vi-VN">越南文 Tiếng Việt</option>
  </select>
</div>

<div id="log">
  <div class="empty" id="emptyState">
    <div class="lamp"></div>
    <p>選好「對方說的語言 → 你要看的語言」<br>按下麥克風，開始口譯紀錄。<br><br>每句話會即時辨識、翻譯，<br>並依時間順序留存，可隨時匯出會議逐字稿。</p>
  </div>
</div>

<footer>
  <div class="status">
    <div class="st1" id="st1">STANDBY</div>
    <div class="st2" id="st2">待命中</div>
  </div>
  <button id="mic" onclick="toggleRec()">開始</button>
</footer>

<div id="sheet" onclick="if(event.target===this)closeSheet()">
  <div class="sheetbox">
    <h3>會議紀錄</h3>
    <button class="sheetbtn" onclick="exportTxt()">下載逐字稿（.txt）<small>含時間戳、原文與譯文</small></button>
    <button class="sheetbtn" onclick="copyAll()">複製全部內容<small>貼到 LINE、Email 或筆記軟體</small></button>
    <button class="sheetbtn danger" onclick="clearAll()">清除本次紀錄</button>
  </div>
</div>

<div id="keySheet" onclick="if(event.target===this)closeKey()" style="position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;z-index:60;">
  <div class="sheetbox">
    <h3>Gemini API Key 設定</h3>
    <p style="font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:12px;">
      貼上你的 Gemini API key（AIza 開頭），啟用 AI 翻譯（品質較佳、懂專業術語）。<br>
      Key 只儲存在<b>這支手機的瀏覽器</b>裡，不會上傳到任何伺服器。<br>
      未設定時自動使用 Google 翻譯（免費、品質普通）。
    </p>
    <input id="keyInput" type="password" placeholder="AIza..." autocomplete="off"
      style="width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--paper);
      border-radius:10px;padding:13px 14px;font-size:15px;font-family:var(--mono);margin-bottom:10px;">
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim);margin-bottom:14px;">
      <input type="checkbox" onchange="document.getElementById('keyInput').type=this.checked?'text':'password'"> 顯示 key
    </label>
    <button class="sheetbtn" style="text-align:center;background:var(--gold);color:var(--ink);font-weight:700;border:none;" onclick="saveKey()">儲存</button>
    <button class="sheetbtn danger" onclick="removeKey()">清除已存的 key</button>
    <p style="font-size:12px;color:var(--dim);line-height:1.7;margin-top:6px;">
      取得方式：aistudio.google.com → Get API key → Create API key
    </p>
  </div>
</div>

<div id="toast"></div>

<script>
const LANG_NAME = {
  'zh-TW':'Traditional Chinese (Taiwan)','en-US':'English','ja-JP':'Japanese',
  'ko-KR':'Korean','de-DE':'German','fr-FR':'French','es-ES':'Spanish',
  'th-TH':'Thai','vi-VN':'Vietnamese'
};
const LANG_LABEL = {
  'zh-TW':'中','en-US':'EN','ja-JP':'日','ko-KR':'韓','de-DE':'德',
  'fr-FR':'法','es-ES':'西','th-TH':'泰','vi-VN':'越'
};

let rec = null, recording = false, manualStop = true;
let entries = [];   // {time, srcLang, dstLang, src, dst}
let seq = 0;

const $ = id => document.getElementById(id);

function toast(msg){
  const t = $('toast'); t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.style.display='none', 2200);
}

function swapLang(){
  const a = $('srcLang'), b = $('dstLang');
  const tmp = a.value; a.value = b.value; b.value = tmp;
  if(recording){ stopRec(); toast('語言已交換，請重新開始'); }
}

/* ── 語音辨識 ── */
function toggleRec(){ recording ? stopRec() : startRec(); }

function startRec(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast('此瀏覽器不支援語音辨識，請改用 Chrome'); return; }
  rec = new SR();
  rec.lang = $('srcLang').value;
  rec.continuous = true;
  rec.interimResults = true;

  let liveEl = null, liveText = '';

  rec.onresult = e => {
    let interim = '', finals = [];
    for(let i = e.resultIndex; i < e.results.length; i++){
      const r = e.results[i];
      if(r.isFinal) finals.push(r[0].transcript.trim());
      else interim += r[0].transcript;
    }
    if(interim){
      if(!liveEl) liveEl = addLive();
      liveEl.querySelector('.src').textContent = interim;
      scrollLog();
    }
    finals.forEach(text => {
      if(!text) return;
      if(liveEl){ liveEl.remove(); liveEl = null; }
      commitEntry(text);
    });
  };

  rec.onerror = e => {
    if(e.error === 'not-allowed'){ toast('請允許麥克風權限'); stopRec(); }
    else if(e.error === 'no-speech'){ /* 靜音，自動重啟 */ }
  };

  rec.onend = () => {
    if(liveEl){ liveEl.remove(); liveEl = null; }
    if(!manualStop && recording){
      try{ rec.start(); }catch(_){}
    } else {
      setRecUI(false);
    }
  };

  manualStop = false;
  try{ rec.start(); }catch(_){}
  setRecUI(true);
}

function stopRec(){
  manualStop = true; recording = false;
  if(rec) try{ rec.stop(); }catch(_){}
  setRecUI(false);
}

function setRecUI(on){
  recording = on;
  document.body.classList.toggle('rec', on);
  $('mic').textContent = on ? '停止' : '開始';
  $('st1').textContent = on ? '● LISTENING' : 'STANDBY';
  $('st2').textContent = on
    ? `聆聽中：${$('srcLang').selectedOptions[0].text} → ${$('dstLang').selectedOptions[0].text}`
    : '待命中';
}

/* ── 紀錄與翻譯 ── */
function nowStr(){
  const d = new Date();
  return d.toTimeString().slice(0,8);
}

function addLive(){
  $('emptyState')?.remove();
  const div = document.createElement('div');
  div.className = 'entry live';
  div.innerHTML = `<div class="meta">辨識中…</div><div class="src"></div>`;
  $('log').appendChild(div);
  return div;
}

function commitEntry(text){
  $('emptyState')?.remove();
  const srcLang = $('srcLang').value, dstLang = $('dstLang').value;
  const id = 'e' + (seq++);
  const time = nowStr();
  const entry = { time, srcLang, dstLang, src:text, dst:'' };
  entries.push(entry);

  const div = document.createElement('div');
  div.className = 'entry'; div.id = id;
  div.innerHTML =
    `<div class="meta">${time}　${LANG_LABEL[srcLang]} → ${LANG_LABEL[dstLang]}</div>`+
    `<div class="src"></div>`+
    `<div class="dst pending">翻譯中…</div>`;
  div.querySelector('.src').textContent = text;
  $('log').appendChild(div);
  scrollLog();

  translate(text, srcLang, dstLang).then(out => {
    entry.dst = out;
    const el = document.querySelector('#'+id+' .dst');
    if(el){ el.textContent = out; el.classList.remove('pending'); }
    scrollLog();
  }).catch(() => {
    const el = document.querySelector('#'+id+' .dst');
    if(el){ el.textContent = '（翻譯失敗，已保留原文）'; }
  });
}

const GCODE = {
  'zh-TW':'zh-TW','en-US':'en','ja-JP':'ja','ko-KR':'ko','de-DE':'de',
  'fr-FR':'fr','es-ES':'es','th-TH':'th','vi-VN':'vi'
};

/* ── API Key 管理（只存在本機瀏覽器）── */
let memKey = '';
function getKey(){
  try{ return localStorage.getItem('gemini_key') || memKey; }catch(_){ return memKey; }
}
function setKeyVal(v){
  memKey = v;
  try{ localStorage.setItem('gemini_key', v); }catch(_){}
}
function openKey(){
  $('keyInput').value = getKey();
  $('keySheet').style.display = 'flex';
}
function closeKey(){ $('keySheet').style.display = 'none'; }
function saveKey(){
  const v = $('keyInput').value.trim();
  if(v && !v.startsWith('AIza')){ toast('格式不像 Gemini key（應為 AIza 開頭）'); return; }
  setKeyVal(v);
  updateKeyBtn();
  closeKey();
  toast(v ? 'Key 已儲存，AI 翻譯已啟用' : '已清空，使用 Google 翻譯');
}
function removeKey(){
  memKey = '';
  try{ localStorage.removeItem('gemini_key'); }catch(_){}
  $('keyInput').value = '';
  updateKeyBtn();
  toast('已清除，改用 Google 翻譯');
}
function updateKeyBtn(){
  $('keyBtn').style.color = getKey() ? 'var(--gold)' : 'var(--dim)';
  $('keyBtn').textContent = getKey() ? '⚙ AI ✓' : '⚙ API';
}
updateKeyBtn();

/* ── 翻譯：Gemini 優先 → Google 備援 ── */
async function translate(text, from, to){
  const key = getKey();
  if(key){
    try{
      const out = await geminiTranslate(text, from, to, key);
      if(out) return out;
    }catch(_){ /* 落到備援 */ }
  }
  return googleTranslate(text, from, to);
}

async function geminiTranslate(text, from, to, key){
  const res = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + encodeURIComponent(key),
    {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{parts:[{text:
          'You are a professional interpreter for business meetings in the financial securities and IT industry. ' +
          'Translate the following ' + LANG_NAME[from] + ' utterance into ' + LANG_NAME[to] + '. ' +
          'Keep technical terms (IT, finance) accurate; well-known English technical terms may stay in English. ' +
          'Output ONLY the translation, no explanations.\n\n' + text
        }]}],
        generationConfig:{ temperature:0.2, maxOutputTokens:1000 }
      })
    }
  );
  if(!res.ok) throw new Error('gemini ' + res.status);
  const data = await res.json();
  return (data?.candidates?.[0]?.content?.parts || [])
    .map(p => p.text || '').join('').trim();
}

async function googleTranslate(text, from, to){
  try{
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx'
      + '&sl=' + GCODE[from] + '&tl=' + GCODE[to]
      + '&dt=t&q=' + encodeURIComponent(text);
    const res = await fetch(url);
    if(res.ok){
      const data = await res.json();
      const out = (data[0]||[]).map(seg => seg[0]).join('').trim();
      if(out) return out;
    }
  }catch(_){}
  const res2 = await fetch('https://api.mymemory.translated.net/get?q='
    + encodeURIComponent(text)
    + '&langpair=' + GCODE[from] + '|' + GCODE[to]);
  const data2 = await res2.json();
  const out2 = data2?.responseData?.translatedText?.trim();
  if(!out2) throw new Error('empty');
  return out2;
}

function scrollLog(){
  const log = $('log');
  log.scrollTop = log.scrollHeight;
}

/* ── 匯出 ── */
function openSheet(){ $('sheet').classList.add('open'); }
function closeSheet(){ $('sheet').classList.remove('open'); }

function buildTranscript(){
  const d = new Date();
  let s = `會議翻譯紀錄\n日期：${d.toLocaleDateString('zh-TW')}\n共 ${entries.length} 句\n${'─'.repeat(30)}\n\n`;
  entries.forEach(e => {
    s += `[${e.time}] ${LANG_LABEL[e.srcLang]} → ${LANG_LABEL[e.dstLang]}\n原文：${e.src}\n譯文：${e.dst || '（未完成）'}\n\n`;
  });
  return s;
}

function exportTxt(){
  if(!entries.length){ toast('目前沒有紀錄'); return; }
  const blob = new Blob([buildTranscript()], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `meeting-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  closeSheet();
}

async function copyAll(){
  if(!entries.length){ toast('目前沒有紀錄'); return; }
  try{
    await navigator.clipboard.writeText(buildTranscript());
    toast('已複製到剪貼簿');
  }catch(_){ toast('複製失敗'); }
  closeSheet();
}

function clearAll(){
  if(!entries.length){ closeSheet(); return; }
  if(!confirm('確定清除本次所有紀錄？此動作無法復原。')) return;
  entries = [];
  $('log').innerHTML = '';
  closeSheet();
  toast('已清除');
}
</script>
</body>
</html>
